<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボードゲーム案内所</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ボードゲーム案内所</h1>
        </div>

        <main class="recommend-container">
            <section class="recommend-setup" id="recommendSetup">
                <div class="form-row">
                    <div class="form-group">
                        <label for="players">遊ぶ人数:</label>
                        <div class="number-input-wrap">
                            <input type="number" id="players" min="1" step="1" placeholder="4" inputmode="numeric">
                            <span>人</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="playTime">時間:</label>
                        <select id="playTime">
                            <option value="15〜30分">15〜30分</option>
                            <option value="30〜60分" selected>30〜60分</option>
                            <option value="60〜120分">60〜120分</option>
                            <option value="2時間以上">2時間以上</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="difficulty">難易度:</label>
                        <select id="difficulty">
                            <option value="初心者向け" selected>初心者向け</option>
                            <option value="中級者向け">中級者向け</option>
                            <option value="上級者向け">上級者向け</option>
                            <option value="おまかせ">おまかせ</option>
                        </select>
                    </div>

                    <div class="form-group action-group">
                        <button class="btn" id="generateBtn" onclick="generateRecommendations()">おすすめを表示</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">希望・こだわり:</label>
                    <textarea id="description" rows="5" placeholder="例: 会話が盛り上がる、運要素が少なめがいい。など"></textarea>
                </div>
            </section>

            <section class="recommend-results" id="recommendResults">
                <div class="results-header">
                    <h2>おすすめのボードゲーム</h2>
                    <button class="btn secondary-btn" onclick="restartRecommendations()">条件を変える</button>
                </div>
                <div class="recommendation-list" id="recommendationList"></div>
            </section>
        </main>

        <div class="status" id="status">Ready</div>
        <div class="loading" id="loading">おすすめを選んでいます...</div>
    </div>

    <script>
        let recommendationData = [];

        document.addEventListener('DOMContentLoaded', function() {
            updateStatus('条件を入力して、おすすめを生成できます。', true);
        });

        function updateStatus(message, isReady) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.style.color = isReady ? '#138a72' : '#e84a5f';
        }

        async function generateRecommendations() {
            const players = document.getElementById('players').value.trim();
            const playTime = document.getElementById('playTime').value;
            const difficulty = document.getElementById('difficulty').value;
            const description = document.getElementById('description').value.trim();

            if (!players) {
                alert('人数を入力してください。');
                return;
            }

            if (!playTime || !difficulty) {
                alert('時間、難易度を選択してください。');
                return;
            }

            const playerCount = Number(players);
            if (!Number.isInteger(playerCount) || playerCount < 1) {
                alert('人数は1以上の数字で入力してください。');
                return;
            }
            setLoading(true);

            try {
                const response = await fetch('/api/boardgames/recommend', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: 'ボードゲーム推薦',
                        players: playerCount,
                        playTime: playTime,
                        difficulty: difficulty,
                        description: description || '特になし',
                        count: 5
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'API error');
                }

                const data = await response.json();
                recommendationData = data.data;

                if (!Array.isArray(recommendationData) || recommendationData.length === 0) {
                    throw new Error('おすすめデータの形式が正しくありません。');
                }

                showRecommendations();
                updateStatus(`${recommendationData.length}件のおすすめを表示しました。`, true);
            } catch (error) {
                console.error('Error:', error);
                alert('おすすめの表示に失敗しました: ' + error.message);
                updateStatus('表示に失敗しました。条件を調整して再度試してください。', false);
            } finally {
                setLoading(false);
            }
        }

        function setLoading(isLoading) {
            document.getElementById('loading').classList.toggle('show', isLoading);
            document.getElementById('generateBtn').disabled = isLoading;
            if (isLoading) {
                updateStatus('登録済みデータから条件に合うゲームを選んでいます。', false);
            }
        }

        function showRecommendations() {
            document.getElementById('recommendSetup').style.display = 'none';
            document.getElementById('recommendResults').style.display = 'block';

            const listEl = document.getElementById('recommendationList');
            listEl.innerHTML = '';

            recommendationData.forEach((game, index) => {
                const article = document.createElement('article');
                article.className = 'recommendation-card';

                const rank = document.createElement('div');
                rank.className = 'recommendation-rank';
                rank.textContent = `候補 ${index + 1}`;

                const title = document.createElement('h3');
                title.textContent = game.title || 'タイトル不明';

                const meta = document.createElement('div');
                meta.className = 'game-meta';
                meta.appendChild(createMetaItem('人数', game.players));
                meta.appendChild(createMetaItem('時間', game.playTime));
                meta.appendChild(createMetaItem('難易度', game.difficulty));
                meta.appendChild(createMetaItem('ジャンル', game.genre));

                const description = createTextBlock('ゲーム説明', getGameDescription(game));

                article.appendChild(rank);
                article.appendChild(title);
                article.appendChild(meta);
                article.appendChild(description);
                listEl.appendChild(article);
            });
        }

        function createMetaItem(label, value) {
            const item = document.createElement('div');
            item.className = 'meta-item';

            const labelEl = document.createElement('span');
            labelEl.className = 'meta-label';
            labelEl.textContent = label;

            const valueEl = document.createElement('span');
            valueEl.className = 'meta-value';
            valueEl.textContent = value || '不明';

            item.appendChild(labelEl);
            item.appendChild(valueEl);
            return item;
        }

        function createTextBlock(label, value) {
            const block = document.createElement('div');
            block.className = 'text-block';

            const heading = document.createElement('h4');
            heading.textContent = label;

            const body = document.createElement('p');
            body.textContent = value || '情報がありません。';

            block.appendChild(heading);
            block.appendChild(body);
            return block;
        }

        function convertStepsToText(game) {
            const candidates = [
                game.howToPlaySteps,
                game.how_to_play_steps,
                game.steps,
                game.playSteps,
                game.play_steps
            ];

            const steps = candidates.find((value) => Array.isArray(value) && value.length > 0);
            return steps ? steps.join('') : '';
        }

        function getGameDescription(game) {
            return game.description
                || game.gameDescription
                || game.game_description
                || game.howToPlay
                || game.how_to_play
                || game.rules
                || game.rule
                || game.detailedRules
                || game.detailed_rules
                || game.detail
                || game.details
                || convertStepsToText(game)
                || game.reason
                || game.overview;
        }

        function restartRecommendations() {
            document.getElementById('recommendResults').style.display = 'none';
            document.getElementById('recommendSetup').style.display = 'block';
            recommendationData = [];
            updateStatus('条件を入力して、おすすめを生成できます。', true);
        }
    </script>
</body>
</html>
